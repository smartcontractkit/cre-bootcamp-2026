name: Deploy Book

on:
  push:
    branches:
      - main
    paths:
      - 'book/**'
      - 'book-es/**'
      - 'book-pt/**'
      - 'book-cn/**'
      - '.github/workflows/deploy-book.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build English book
        working-directory: ./book
        run: mdbook build

      - name: Build Spanish book
        working-directory: ./book-es
        run: mdbook build

      - name: Build Portuguese book
        working-directory: ./book-pt
        run: mdbook build

      - name: Build Mandarin book
        working-directory: ./book-cn
        run: mdbook build

      # Output dirs match each book's [build] build-dir in book.toml (not always "book").
      - name: Merge into single site
        run: |
          set -euo pipefail
          mkdir -p _site _site/es _site/pt _site/cn
          cp -R ./book/book/. _site/
          cp -R ./book-es/book-es/. _site/es/
          cp -R ./book-pt/book-pt/. _site/pt/
          cp -R ./book-cn/book/. _site/cn/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
